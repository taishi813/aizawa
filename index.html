<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>相澤仁美 AIチャット</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #0f1115;
  color: white;
  height: 100vh;
  overflow: hidden;
}

/* 背景 */
.bg {
  position: fixed;
  inset: 0;
  background: url("aizawa.jpg") center/cover no-repeat;
  filter: blur(18px) brightness(0.4);
  z-index: 0;
}

/* キャラ */
.character {
  position: fixed;
  right: 0;
  bottom: 0;
  height: 100%;
  z-index: 1;
  pointer-events: none; /* ←これ重要（UIを邪魔しない） */
}

/* チャット領域 */
.chat {
  position: fixed;
  left: 0;
  top: 0;
  width: 45%;
  height: calc(100% - 80px);
  overflow-y: auto;
  padding: 20px;
  z-index: 2;

  background: linear-gradient(
    to right,
    rgba(20,20,25,0.95),
    rgba(20,20,25,0.8),
    rgba(20,20,25,0)
  );
}

/* メッセージ */
.message {
  max-width: 80%;
  margin-bottom: 15px;
  padding: 12px 16px;
  border-radius: 18px;
  line-height: 1.6;
  white-space: pre-wrap;
}

.user {
  background: #ff4fa3;
  margin-left: auto;
}

.ai {
  background: rgba(255,255,255,0.15);
}

/* 入力エリア */
.input-area {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 45%;
  height: 80px;
  display: flex;
  align-items: center;
  padding: 10px;
  gap: 10px;
  z-index: 999; /* ←最前面 */

  background: rgba(20,20,25,0.95);
}

/* textarea（ここが重要修正） */
textarea {
  flex: 1;
  height: 50px;
  resize: none;
  border-radius: 10px;
  border: none;
  outline: none;

  padding: 10px;

  background: #ffffff; /* ←完全白 */
  color: #000000;      /* ←完全黒 */
  font-size: 14px;

  z-index: 1000;
}

/* ボタン */
button {
  height: 50px;
  padding: 0 18px;
  border-radius: 10px;
  border: none;
  background: #ff4fa3;
  color: white;
  font-size: 14px;
  cursor: pointer;

  z-index: 1000;
}

button:active {
  opacity: 0.8;
}
</style>
</head>

<body>

<div class="bg"></div>
<img src="aizawa.png" class="character">

<div id="chat" class="chat"></div>

<div class="input-area">
  <textarea id="input" placeholder="メッセージを入力"></textarea>
  <button id="sendBtn">送信</button>
</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("input");
const sendBtn = document.getElementById("sendBtn");

let history = [];

function addMessage(text, type) {
  const div = document.createElement("div");
  div.className = "message " + type;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function send() {
  const text = input.value.trim();
  if (!text) return;

  addMessage(text, "user");
  input.value = "";

  history.push({ role: "user", content: text });
  history = history.slice(-8);

  const loading = document.createElement("div");
  loading.className = "message ai";
  loading.textContent = "考え中...";
  chat.appendChild(loading);

  try {
    const res = await fetch("/api/deepseek", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        history
      })
    });

    const data = await res.json();
    loading.remove();

    if (!res.ok) {
      addMessage("エラー: " + JSON.stringify(data), "ai");
      return;
    }

    addMessage(data.reply, "ai");
    history.push({ role: "assistant", content: data.reply });

  } catch (e) {
    loading.remove();
    addMessage("通信エラー", "ai");
  }
}

/* ボタン */
sendBtn.addEventListener("click", send);

/* Enter送信（Shift+Enterで改行） */
input.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey && !e.isComposing) {
    e.preventDefault();
    send();
  }
});
</script>

</body>
</html>
