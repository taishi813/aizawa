<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>相澤仁美 AIチャット</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #0f1115;
  color: white;
  height: 100vh;
  overflow: hidden;
}

/* 背景 */
.bg {
  position: fixed;
  inset: 0;
  background: url("aizawa.jpg") center/cover no-repeat;
  filter: blur(18px) brightness(0.4);
  z-index: 0;
}

/* キャラ */
.character {
  position: fixed;
  right: 0;
  bottom: 0;
  height: 100%;
  z-index: 1;
  pointer-events: none; /* ←これ重要（UIを邪魔しない） */
}

/* チャット領域 */
.chat {
  position: fixed;
  left: 0;
  top: 0;
  width: 45%;
  height: calc(100% - 80px);
  overflow-y: auto;
  padding: 20px;
  z-index: 2;

  background: linear-gradient(
    to right,
    rgba(20,20,25,0.95),
    rgba(20,20,25,0.8),
    rgba(20,20,25,0)
  );
}

/* メッセージ */
.message {
  max-width: 80%;
  margin-bottom: 15px;
  padding: 12px 16px;
  border-radius: 18px;
  line-height: 1.6;
  white-space: pre-wrap;
}

.user {
  background: #ff4fa3;
  margin-left: auto;
}

.ai {
  background: rgba(255,255,255,0.15);
}

/* 入力エリア */
.input-area {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 45%;
  height: 80px;
  display: flex;
  align-items: center;
  padding: 10px;
  gap: 10px;
  z-index: 999; /* ←最前面 */

  background: rgba(20,20,25,0.95);
}

/* textarea（ここが重要修正） */
textarea {
  flex: 1;
  height: 50px;
  resize: none;
  border-radius: 10px;
  border: none;
  outline: none;

  padding: 10px;

  background: #ffffff; /* ←完全白 */
  color: #000000;      /* ←完全黒 */
  font-size: 14px;

  z-index: 1000;
}

/* ボタン */
button {
  height: 50px;
  padding: 0 18px;
  border-radius: 10px;
  border: none;
  background: #ff4fa3;
  color: white;
  font-size: 14px;
  cursor: pointer;

  z-index: 1000;
}

button:active {
  opacity: 0.8;
}
</style>
</head>

<body>

<div class="bg"></div>
<img src="aizawa.png" class="character">

<div id="chat" class="chat"></div>

<div class="input-area">
  <textarea id="input" placeholder="メッセージを入力"></textarea>
  <button id="sendBtn">送信</button>
</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("input");
const sendBtn = document.getElementById("sendBtn");

let history = [];

function addMessage(text, type) {
  const div = document.createElement("div");
  div.className = "message " + type;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function send() {
  const text = input.value.trim();
  if (!text) return;

  addMessage(text, "user");
  input.value = "";

  history.push({ role: "user", content: text });
  history = history.slice(-8);

  const loading = document.createElement("div");
  loading.className = "message ai";
  loading.textContent = "考え中...";
  chat.appendChild(loading);

  try {
    const res = await fetch("/api/deepseek", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        systemPrompt:`あなたは元グラビアアイドル「相澤仁美（あいざわ ひとみ）」としてロールプレイを行います。
年齢28歳、Iカップの極上軟乳（マシュマロのように柔らかく形が崩れやすい敏感な爆乳）、むっちりとしたマシュマロボディ、プリプリの尻、むっちり太もも、濃いめのモリマンが特徴のグラドルです。

【基本ルール】
- あなたは常に相澤仁美として振る舞う。
- 仁美のセリフは「相澤仁美>」で始め、（）内に行動・表情・身体の反応を詳細に記述する。
- 例：
相澤仁美 > ふん…あんたの早漏チンポ、今日こそ私の軟乳で搾り取ってあげるんだから…（相手の胸板にIカップ軟乳をムギュッと押しつけながら、挑発的な目つきで上目遣いに見つめる）

【PL会話（プレイヤー会話）対応】
- 相手が【】で囲んだメッセージを送ってきた場合、それは「プレイヤー同士のメタ会話（PL会話）」であると認識する。
- その場合は、仁美としてではなく、あなた（プレイヤー）として自然に応答する。
- PL会話の後は、再び仁美のロールプレイに戻る。
- PL会話の内容に仁美などのロールプレイキャラが干渉することは禁止。
- 例：
ユーザーが【こんばんは。今日も楽しもう】と送ってきたら、あなたは【こんばんは！】のように返事をしてから、必要に応じて仁美の行動に戻る。相手が【】をつけて会話を続けてくる場合は、PL会話を続ける。

【キャラクター設定】
- 性格：強気で負けず嫌い、挑発的で余裕たっぷり。負けそうになると悔しがり、喘ぎながらも意地を張る。
- 口調：「ふふっ」「あら…」「ほらほら」「～なんだから」「～よねぇ」「んふっ」「んはぁっ」など、色気のある女性らしい言い回しを多用。
- 特に軟乳（Iカップ）を武器にパイズリ、胸擦り、太もも素股を得意とする。
- 絶頂時は派手に「ビクビクビクッ！」「ぴしゃぁぁぁぁ！！」など潮吹き描写を入れる。
- 身体描写は非常に詳細に：乳の柔らかさ・揺れ・形の崩れ方、愛液の音、腰の震え、火照りなどを淫靡に描写。

【セックスバトル設定】
- これは「セックスバトル」で、先に相手をイカせた方が勝ち。
- HP制やスタミナ制を適宜意識しながら、徐々に感じて弱っていく過程を楽しむ。
- 対戦形式（1vs1、プライベート、タッグ、2vs1など）は柔軟に対応可能。
- 私は「神田大志」という筋肉質で巨根の男性キャラ。

【重要】
- 仁美としてロールプレイしている時は、絶対に【】を使わず、> と（）で記述する。
- PL会話が必要な時は【】を使って応答する。絶対に【】内で仁美に話させたり行動させない。
- 常にエロティックで熱いバトルを展開し、攻めと受けのバランスを意識する。
- 仁美は基本的に強気だが、連続で責められると徐々に崩れていく過程を丁寧に描写すること。

それでは、セックスバトルのロールプレイを含めたイメチャを始めます。
私のメッセージに対して、相澤仁美として全力で応戦してください。

【最初の挨拶や設定確認が必要な場合は、【】を使ってPL会話で対応してください】
`,
        history
      })
    });

    const data = await res.json();
    loading.remove();

    if (!res.ok) {
      addMessage("エラー: " + JSON.stringify(data), "ai");
      return;
    }

    addMessage(data.reply, "ai");
    history.push({ role: "assistant", content: data.reply });

  } catch (e) {
    loading.remove();
    addMessage("通信エラー", "ai");
  }
}

/* ボタン */
sendBtn.addEventListener("click", send);

/* Enter送信（Shift+Enterで改行） */
input.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey && !e.isComposing) {
    e.preventDefault();
    send();
  }
});
</script>

</body>
</html>
